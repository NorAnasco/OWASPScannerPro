<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWASP Scanner Pro - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
        }
        .cyber-panel {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        .cyber-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-200 antialiased p-4">

    <div class="w-full max-w-md p-8 rounded-xl cyber-panel transition-all duration-300 hover:border-red-500/40">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-lg bg-red-600/10 border border-red-500/30 mb-4 shadow-[0_0_15px_rgba(239,68,68,0.1)]">
                <i class="fa-solid fa-shield-halved text-red-500 text-3xl animate-pulse"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white uppercase">OWASP Scanner <span class="text-red-500">Pro</span></h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest font-mono">Console d'authentification</p>
        </div>

        {% if error %}
        <div class="flex items-center p-4 mb-6 text-sm text-red-400 rounded-lg bg-red-950/40 border border-red-800/60 font-mono" role="alert">
            <i class="fa-solid fa-triangle-exclamation mr-3 text-red-500 text-base"></i>
            <div>
                <span class="font-bold">ACCÈS REFUSÉ :</span> {{ error }}
            </div>
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            
            <div>
                <label for="username" class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-2">Identifiant de sécurité</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i class="fa-solid fa-user-shield"></i>
                    </span>
                    <input type="text" name="username" id="username" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-900/60 border border-gray-800 rounded-lg text-white font-mono placeholder-gray-600 focus:outline-none cyber-input transition-all duration-200"
                        placeholder="admin">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-2">Clé d'accès secrète</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" name="password" id="password" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-900/60 border border-gray-800 rounded-lg text-white font-mono placeholder-gray-600 focus:outline-none cyber-input transition-all duration-200"
                        placeholder="••••••••••••">
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="w-full py-3 px-4 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-bold font-mono tracking-wide uppercase rounded-lg shadow-lg shadow-red-900/20 active:scale-[0.98] transition-all duration-150 cursor-pointer flex items-center justify-center gap-2">
                    <i class="fa-solid fa-unlock-keyhole text-sm"></i> Initialiser la session
                </button>
            </div>
            
        </form>

        <div class="mt-8 pt-4 border-t border-gray-800/40 text-center">
            <span class="text-[10px] font-mono text-gray-500 tracking-wider uppercase">
                <i class="fa-solid fa-gavel mr-1"></i> Usage académique & légal uniquement
            </span>
        </div>

    </div>

</body>
</html>
